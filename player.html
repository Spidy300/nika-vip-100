<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Responsive ArtPlayer</title>
    
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/artplayer/dist/artplayer.js"></script>
    
    <style>
        /* Mobile-first reset: prevents pull-to-refresh and double-tap zoom */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: #000; 
            overflow: hidden; 
            font-family: sans-serif; 
            touch-action: none; /* Disables browser-level zooming/panning on swipe */
            -webkit-tap-highlight-color: transparent; /* Removes blue flash on mobile taps */
        }
        
        #artplayer-app { 
            width: 100vw; 
            height: 100vh; 
            /* Respects safe areas for modern phone notches (iPhone) */
            padding-left: env(safe-area-inset-left);
            padding-right: env(safe-area-inset-right);
        }

        #status-overlay { 
            position: absolute; 
            top: 10px; 
            left: 10px; 
            z-index: 9999; 
            color: #94a3b8; 
            font-size: 14px; 
            background: rgba(0,0,0,0.6); 
            padding: 5px 10px; 
            border-radius: 4px; 
            pointer-events: none; 
        }
        #status-overlay.error { color: #f87171; }
        #status-overlay.hidden { display: none; }
    </style>
</head>
<body>
    <div id="status-overlay">Loading stream...</div>
    <div id="artplayer-app"></div>

    <script>
    // ── CRITICAL FIX: monkey-patch MediaSource.addSourceBuffer ───────────────
    (function () {
        const _orig = MediaSource.prototype.addSourceBuffer;
        MediaSource.prototype.addSourceBuffer = function (mimeType) {
            const fixed = mimeType.replace(/mp4a\.\d+\.\d+/g, 'mp4a.40.2');
            return _orig.call(this, fixed);
        };
    })();
    // ─────────────────────────────────────────────────────────────────────────

    const statusOverlay = document.getElementById('status-overlay');
    const PROXY_BASE = 'http://127.0.0.1:8000';

    const streams = [
        { type: 'hls', url: 'https://vault-16.owocdn.top/hls/16/14/e07bde2b257fbe44cb15d6702d3251415c114fd6b01283cf9669b116bfd9044a/owo.m3u8', label: 'Vault HLS' },
        { type: 'embed', url: 'https://kwik.cx/e/Jsjmpaaq8Wb5', label: 'Kwik Fallback' }
    ];

    async function resolveStream(stream) {
        if (stream.type === 'hls') return `${PROXY_BASE}/proxy?url=${encodeURIComponent(stream.url)}`;
        if (stream.type === 'embed') {
            const res = await fetch(`${PROXY_BASE}/kwik-extract?url=${encodeURIComponent(stream.url)}`);
            if (!res.ok) throw new Error(`kwik-extract failed: ${res.status}`);
            const data = await res.json();
            return `${PROXY_BASE}/proxy?url=${encodeURIComponent(data.m3u8)}`;
        }
    }

    function initPlayer(url) {
        statusOverlay.classList.add('hidden');

        var art = new Artplayer({
            container: '#artplayer-app',
            url: url,
            theme: '#a855f7', 
            volume: 0.7,
            
            // ── Mobile & Desktop UX Enhancements ──
            playsInline: true,         // Crucial for iOS: stops Apple devices from forcing their own native full-screen immediately
            autoOrientation: true,     // Mobile: Automatically rotates the user's phone landscape when hitting fullscreen
            lock: true,                // Mobile: Adds a padlock icon so users don't accidentally skip/pause while holding their phone
            fastForward: true,         // Mobile/Desktop: Double tap the left/right side of the screen to skip 10 seconds
            pip: true,                 // Desktop: Adds Picture-in-Picture mode
            setting: true,             // Enables the gear icon for settings
            playbackRate: true,        // Allows users to watch at 1.5x / 2x speed
            aspectRatio: true,         // Adds a button to stretch 4:3 anime to 16:9
            fullscreen: true,          
            fullscreenWeb: true,       // Desktop: Browser-level full screen (theater mode)
            miniProgressBar: true,     // Shows a tiny progress line at the bottom when controls auto-hide
            
            customType: {
                m3u8: function (video, url, art) {
                    if (Hls.isSupported()) {
                        if (art.hls) art.hls.destroy();
                        const hls = new Hls({ xhrSetup(xhr) { xhr.withCredentials = false; } });
                        hls.loadSource(url);
                        hls.attachMedia(video);
                        art.hls = hls;

                        // Dynamic Quality Selector
                        hls.on(Hls.Events.MANIFEST_PARSED, function () {
                            let qualities = hls.levels.map((level, index) => ({
                                html: level.height + 'p',
                                value: index,
                                default: level.height === Math.max(...hls.levels.map(l => l.height))
                            }));

                            if (qualities.length > 1) {
                                art.setting.add({
                                    width: 200,
                                    html: 'Quality',
                                    tooltip: 'Auto',
                                    selector: [{ html: 'Auto', value: -1, default: true }, ...qualities],
                                    onSelect: function (item) {
                                        hls.currentLevel = item.value;
                                        return item.html;
                                    },
                                });
                            }
                        });

                        hls.on(Hls.Events.ERROR, (event, data) => {
                            if (data.fatal) {
                                if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
                                    hls.startLoad();
                                } else {
                                    hls.destroy();
                                    art.notice.show = "Stream error. Please refresh.";
                                }
                            }
                        });

                    } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                        video.src = url; // Fallback for Safari natively supporting HLS
                    } else {
                        art.notice.show = "HLS not supported on this browser.";
                    }
                }
            }
        });
    }

    (async () => {
        for (const stream of streams) {
            try {
                statusOverlay.textContent = `Loading ${stream.label}...`;
                const proxyUrl = await resolveStream(stream);
                initPlayer(proxyUrl);
                return; 
            } catch (e) {
                console.warn(`Failed: ${stream.label}`);
            }
        }
        statusOverlay.textContent = 'Stream unavailable.';
        statusOverlay.className = 'error';
    })();
    </script>
</body>
</html>
