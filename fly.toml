# fly.toml app configuration file generated for nikastream-api on 2026-05-27T10:47:06+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'nikastream-api'
primary_region = 'bom'

[build]

[env]
  ALLOWED_ORIGINS = "https://nikastream.sbs,https://www.nikastream.sbs,https://nika-stream-2cs.pages.dev"
  ENVIRONMENT = "production"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '256mb'
  cpus = 1
  memory_mb = 256